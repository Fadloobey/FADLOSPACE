{% extends "base.html" %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card card-modern">
                <div class="card-header" style="background: transparent; border-bottom: 1px solid rgba(255,255,255,0.15);">
                    <h5 style="color: #fff;"><i class="fas fa-user-circle text-accent me-2"></i>{{ t.profile }}</h5>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="text-center mb-4">
                            <img src="{{ user.avatar }}" alt="Avatar" class="rounded-circle" style="width:120px;height:120px;object-fit:cover;border:3px solid #fdcb6e;">
                            <div class="mt-2">
                                <label for="avatar" class="btn btn-outline-light btn-sm"><i class="fas fa-camera"></i> {{ t.avatar }}</label>
                                <input type="file" name="avatar" id="avatar" accept="image/*" style="display:none;" onchange="this.form.submit()">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label style="color: rgba(255,255,255,0.8);">{{ t.full_name }}</label>
                            <input type="text" name="full_name" class="form-control" value="{{ user.full_name or '' }}" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff;">
                        </div>
                        <div class="mb-3">
                            <label style="color: rgba(255,255,255,0.8);">{{ t.email }}</label>
                            <input type="email" name="email" class="form-control" value="{{ user.email or '' }}" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff;">
                        </div>
                        <button type="submit" class="btn btn-primary">{{ t.update_profile }}</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
