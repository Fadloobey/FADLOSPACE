<!DOCTYPE html>
<html lang="{{ lang }}" dir="{% if lang == 'ar' %}rtl{% else %}ltr{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FADLO – {{ t.login }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet" id="bootstrap-rtl">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=8">
    <style>
        html, body { height: 100%; margin: 0; }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-bg);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 2.5rem 2rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        .login-card h2 { color: #fff; font-weight: 700; }
        .login-card p { color: rgba(255,255,255,0.8); }
        .login-card .form-control {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 0.8rem 1rem;
            border-radius: 12px;
        }
        .login-card .form-control::placeholder { color: rgba(255,255,255,0.6); }
        .login-card .form-control:focus {
            border-color: #22d3ee;
            box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.2);
        }
        .login-card .input-group-text {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 12px 0 0 12px;
        }
        .login-card .input-group .form-control {
            border-radius: 0 12px 12px 0;
            border-left: none;
        }
        [dir="rtl"] .login-card .input-group-text {
            border-radius: 0 12px 12px 0;
        }
        [dir="rtl"] .login-card .input-group .form-control {
            border-radius: 12px 0 0 12px;
            border-left: 1px solid rgba(255,255,255,0.2);
            border-right: none;
        }
        .login-card .btn-primary {
            background: linear-gradient(135deg, #0ea5e9, #3b82f6) !important;
            border: none;
            padding: 0.8rem;
            font-weight: 600;
            border-radius: 50px;
            color: #fff;
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.4);
        }
        .login-card .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(14, 165, 233, 0.6);
        }
        .login-card .text-muted { color: rgba(255,255,255,0.5) !important; }
        @media (max-width: 576px) {
            .login-card { padding: 1.8rem 1.2rem; margin: 1rem; }
        }
    </style>
</head>
<body>
    <div class="login-card" data-aos="zoom-in" data-aos-duration="800">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='images/logo.png') }}" 
                 alt="FADLO" 
                 style="max-width: 120px; width: 100%; height: auto; margin-bottom: 0.5rem;">
            <h2 class="mt-2">{{ t.login_title }}</h2>
            <p>{{ t.login_subtitle }}</p>
        </div>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" name="username" placeholder="{{ t.username }}" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" name="password" placeholder="{{ t.password }}" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-sign-in-alt me-2"></i>{{ t.login_button }}
            </button>
        </form>
        <div class="text-center mt-3">
            <small class="text-muted">{{ t.login_subtitle }}</small>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
